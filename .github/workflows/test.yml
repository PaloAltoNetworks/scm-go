name: Run Tests

on:
  push:
    branches:
      - develop
      - token-cache-feature
  pull_request:
    branches:
      - develop
      - token-cache-feature

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - objects
          - network_services
          - security_services
          - identity_services
          - deployment_services
          - config_setup
          - config_operations

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Create SCM config file from secrets
        run: |
          mkdir -p config
          cat > config/scm-config.json << 'EOF'
          {
            "auth_url": "${{ secrets.SCM_AUTH_URL }}",
            "client_id": "${{ secrets.SCM_CLIENT_ID }}",
            "client_secret": "${{ secrets.SCM_CLIENT_SECRET }}",
            "host": "${{ secrets.SCM_HOST }}",
            "protocol": "${{ secrets.SCM_PROTOCOL }}",
            "scope": "${{ secrets.SCM_SCOPE }}",
            "logging": "quiet",
            "skip_verify_certificate": ${{ secrets.SCM_SKIP_VERIFY_CERTIFICATE }}
          }
          EOF

      - name: Run tests for ${{ matrix.service }}
        run: |
          set +e
          output=$(go test -timeout 60m -parallel 10 -skip "Test_objects_ApplicationsAPIService_List" ./generated/${{ matrix.service }}/... 2>&1)
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            echo "❌ Tests failed for ${{ matrix.service }}"
            echo "$output" | grep -E "(FAIL|--- FAIL:|panic:|Error:)" || echo "$output"
            exit $exit_code
          else
            echo "✅ All tests passed for ${{ matrix.service }}"
          fi
        timeout-minutes: 30
