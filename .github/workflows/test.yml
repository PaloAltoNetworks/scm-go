name: Run Tests

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Create SCM config file from secrets
        run: |
          mkdir -p config
          cat > config/scm-config.json << 'EOF'
          {
            "auth_url": "${{ secrets.SCM_AUTH_URL }}",
            "client_id": "${{ secrets.SCM_CLIENT_ID }}",
            "client_secret": "${{ secrets.SCM_CLIENT_SECRET }}",
            "host": "${{ secrets.SCM_HOST }}",
            "protocol": "${{ secrets.SCM_PROTOCOL }}",
            "scope": "${{ secrets.SCM_SCOPE }}",
            "logging": "${{ secrets.SCM_LOGGING }}",
            "skip_verify_certificate": ${{ secrets.SCM_SKIP_VERIFY_CERTIFICATE }}
          }
          EOF

      - name: Run all tests
        run: go test -v -skip "LogicalRouters|Test_objects_ApplicationsAPIService_List" ./...
        timeout-minutes: 30

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed with exit code: $?" >> $GITHUB_STEP_SUMMARY
